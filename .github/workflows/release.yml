name: release-v2

# Builda e pubblica l'eseguibile C# al push di un tag v2* (es. v2.0.0)
on:
  push:
    tags:
      - 'v2*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish single-file exe
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          dotnet publish src/PdfMerge/PdfMerge.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=$v `
            -o publish

      - name: Pubblica la release con l'exe allegato
        uses: softprops/action-gh-release@v2
        with:
          files: publish/pdfmerge.exe
          generate_release_notes: true
